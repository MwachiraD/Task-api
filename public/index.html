<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            color: #222;
            margin: 0;
            padding: 24px;
        }

        .container {
            max-width: 980px;
            margin: 0 auto;
        }

        h1, h2 {
            margin-top: 0;
        }

        .panel {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 12px;
        }

        label {
            display: block;
            font-size: 14px;
            margin-bottom: 6px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        button {
            background: #1f6feb;
            color: #fff;
            border: none;
            cursor: pointer;
        }

        button.secondary {
            background: #6c757d;
        }

        button.danger {
            background: #c0392b;
        }

        button:disabled {
            background: #999;
            cursor: not-allowed;
        }

        .toolbar {
            display: grid;
            grid-template-columns: 1fr 160px;
            gap: 12px;
            margin-bottom: 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #fff;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            background: #f0f0f0;
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .actions button {
            width: auto;
        }

        .message {
            display: none;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 6px;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #eaf7ee;
            color: #1f6b38;
            border: 1px solid #b6dfc2;
        }

        .message.error {
            background: #fdeeee;
            color: #9f2d20;
            border: 1px solid #efc2bd;
        }

        .empty {
            text-align: center;
            color: #666;
        }

        .report-row {
            margin-bottom: 10px;
            padding: 10px;
            background: #f8f8f8;
            border: 1px solid #e3e3e3;
            border-radius: 6px;
        }

        .report-row strong {
            display: block;
            margin-bottom: 4px;
            text-transform: capitalize;
        }

        @media (max-width: 700px) {
            .toolbar {
                grid-template-columns: 1fr;
            }

            .actions {
                flex-direction: column;
            }

            .actions button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Task Manager</h1>
        <p>Use this page to create tasks, update task status, delete completed tasks, and view the daily report.</p>

        <div id="message" class="message"></div>

        <div class="panel">
            <h2>Create Task</h2>
            <div class="grid">
                <div>
                    <label for="title">Title</label>
                    <input type="text" id="title" placeholder="Enter task title">
                </div>
                <div>
                    <label for="dueDate">Due Date</label>
                    <input type="date" id="dueDate">
                </div>
                <div>
                    <label for="priority">Priority</label>
                    <select id="priority">
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                    </select>
                </div>
                <div>
                    <label>&nbsp;</label>
                    <button type="button" onclick="createTask()">Create Task</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Tasks</h2>
            <div class="toolbar">
                <select id="statusFilter" onchange="fetchTasks()">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="in_progress">In Progress</option>
                    <option value="done">Done</option>
                </select>
                <button type="button" class="secondary" onclick="fetchTasks()">Refresh</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Due Date</th>
                        <th>Priority</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="tasksTable"></tbody>
            </table>
        </div>

        <div class="panel">
            <h2>Daily Report</h2>
            <div class="toolbar">
                <input type="date" id="reportDate">
                <button type="button" class="secondary" onclick="fetchReport()">Load Report</button>
            </div>
            <div id="reportResult"></div>
        </div>
    </div>

    <script>
        const API_URL = "/api/tasks";

        function setMessage(text, type) {
            const message = document.getElementById("message");
            message.textContent = text;
            message.className = `message show ${type}`;
        }

        function clearMessage() {
            const message = document.getElementById("message");
            message.textContent = "";
            message.className = "message";
        }

        async function apiRequest(url, options = {}) {
            const config = {
                headers: {
                    Accept: "application/json",
                    ...(options.body ? { "Content-Type": "application/json" } : {})
                },
                ...options
            };

            const response = await fetch(url, config);
            const data = await response.json().catch(() => ({}));

            if (!response.ok) {
                const firstError = data.errors ? Object.values(data.errors).flat()[0] : null;
                throw new Error(firstError || data.message || "Request failed.");
            }

            return data;
        }

        function nextStatus(currentStatus) {
            if (currentStatus === "pending") {
                return "in_progress";
            }

            if (currentStatus === "in_progress") {
                return "done";
            }

            return null;
        }

        async function createTask() {
            clearMessage();

            const payload = {
                title: document.getElementById("title").value.trim(),
                due_date: document.getElementById("dueDate").value,
                priority: document.getElementById("priority").value
            };

            try {
                await apiRequest(API_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                document.getElementById("title").value = "";
                setMessage("Task created successfully.", "success");
                await fetchTasks();
                await fetchReport();
            } catch (error) {
                setMessage(error.message, "error");
            }
        }

        async function fetchTasks() {
            const status = document.getElementById("statusFilter").value;
            const url = status ? `${API_URL}?status=${encodeURIComponent(status)}` : API_URL;
            const table = document.getElementById("tasksTable");

            try {
                const data = await apiRequest(url);
                const tasks = Array.isArray(data) ? data : data.tasks;

                if (!tasks || !tasks.length) {
                    table.innerHTML = '<tr><td colspan="5" class="empty">No tasks found.</td></tr>';
                    return;
                }

                table.innerHTML = tasks.map(task => {
                    const next = nextStatus(task.status);
                    const nextButton = next
                        ? `<button type="button" onclick="updateStatus(${task.id}, '${next}')">Move to ${next.replace('_', ' ')}</button>`
                        : `<button type="button" disabled>Completed</button>`;

                    return `
                        <tr>
                            <td>${task.title}</td>
                            <td>${task.due_date}</td>
                            <td>${task.priority}</td>
                            <td>${task.status}</td>
                            <td>
                                <div class="actions">
                                    ${nextButton}
                                    <button type="button" class="danger" onclick="deleteTask(${task.id})">Delete</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join("");
            } catch (error) {
                table.innerHTML = '<tr><td colspan="5" class="empty">Unable to load tasks.</td></tr>';
                setMessage(error.message, "error");
            }
        }

        async function updateStatus(id, status) {
            clearMessage();

            try {
                await apiRequest(`${API_URL}/${id}/status`, {
                    method: "PATCH",
                    body: JSON.stringify({ status })
                });

                setMessage(`Task moved to ${status.replace("_", " ")}.`, "success");
                await fetchTasks();
                await fetchReport();
            } catch (error) {
                setMessage(error.message, "error");
            }
        }

        async function deleteTask(id) {
            clearMessage();

            try {
                await apiRequest(`${API_URL}/${id}`, {
                    method: "DELETE"
                });

                setMessage("Task deleted successfully.", "success");
                await fetchTasks();
                await fetchReport();
            } catch (error) {
                setMessage(error.message, "error");
            }
        }

        async function fetchReport() {
            const reportDate = document.getElementById("reportDate").value;
            const reportResult = document.getElementById("reportResult");

            if (!reportDate) {
                reportResult.innerHTML = "";
                return;
            }

            try {
                const data = await apiRequest(`${API_URL}/report?date=${encodeURIComponent(reportDate)}`);

                reportResult.innerHTML = ["high", "medium", "low"].map(priority => `
                    <div class="report-row">
                        <strong>${priority}</strong>
                        <div>Pending: ${data.summary[priority].pending}</div>
                        <div>In Progress: ${data.summary[priority].in_progress}</div>
                        <div>Done: ${data.summary[priority].done}</div>
                    </div>
                `).join("");
            } catch (error) {
                reportResult.innerHTML = "";
                setMessage(error.message, "error");
            }
        }

        const today = new Date().toISOString().split("T")[0];
        document.getElementById("dueDate").value = today;
        document.getElementById("reportDate").value = today;

        fetchTasks();
        fetchReport();
    </script>
</body>
</html>
