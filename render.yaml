services:
  - type: pserv
    name: task-api-mysql
    runtime: docker
    plan: starter
    dockerfilePath: ./docker/mysql/Dockerfile
    envVars:
      - key: MYSQL_DATABASE
        value: task_api
      - key: MYSQL_USER
        value: task_api_user
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10

  - type: web
    name: task-api
    runtime: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    preDeployCommand: ./render/predeploy.sh
    healthCheckPath: /up
    envVars:
      - key: APP_NAME
        value: Task API
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromService:
          type: pserv
          name: task-api-mysql
          property: host
      - key: DB_PORT
        value: "3306"
      - key: DB_DATABASE
        value: task_api
      - key: DB_USERNAME
        value: task_api_user
      - key: DB_PASSWORD
        fromService:
          type: pserv
          name: task-api-mysql
          envVarKey: MYSQL_PASSWORD
